<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 15px 0;
            font-size: 1.2rem;
        }

        .score-item {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 25px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .score-item span {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.5rem;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            background: #0a0a0a;
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-music {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
        }

        .btn-music:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(155, 89, 182, 0.4);
        }

        .btn-music.active {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0a0a;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .instructions h3 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            justify-content: center;
            margin-top: 20px;
            gap: 5px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
            border-radius: 10px;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(0.95);
        }

        .mobile-btn.up { grid-column: 2; grid-row: 1; }
        .mobile-btn.left { grid-column: 1; grid-row: 2; }
        .mobile-btn.down { grid-column: 2; grid-row: 3; }
        .mobile-btn.right { grid-column: 3; grid-row: 2; }

        @media (max-width: 850px) {
            h1 {
                font-size: 1.8rem;
            }

            .score-board {
                gap: 20px;
                font-size: 1rem;
            }

            .mobile-btn {
                width: 55px;
                height: 55px;
            }
        }

        @media (max-width: 500px) {
            .mobile-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff4444;
            display: none;
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        
        <div class="score-board">
            <div class="score-item">
                得分: <span id="score">0</span>
            </div>
            <div class="score-item">
                最高分: <span id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <button class="btn-start" id="startBtn">开始游戏</button>
            <button class="btn-pause" id="pauseBtn">暂停</button>
            <button class="btn-music" id="musicBtn">🎵 音乐开</button>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn up">↑</button>
            <button class="mobile-btn left">←</button>
            <button class="mobile-btn down">↓</button>
            <button class="mobile-btn right">→</button>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <p>使用 ↑ ↓ ← → 方向键或 WASD 控制蛇的移动</p>
            <p>吃到食物得分，撞墙或撞到自己游戏结束</p>
            <p>按空格键暂停/继续游戏</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>你的得分: <span id="finalScore">0</span></p>
        <button class="btn-start" onclick="restartGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const musicBtn = document.getElementById('musicBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const gridSize = 20;
        let tileCountX, tileCountY;  // 动态计算

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 130; // 减慢30%
        let isRunning = false;
        let isPaused = false;
        let musicEnabled = true;

        highScoreEl.textContent = highScore;

        // 动态调整画布大小
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);  // 最大800，留边距
            const aspectRatio = 2;  // 宽高比 2:1
            
            canvas.width = maxWidth;
            canvas.height = maxWidth / aspectRatio;
            
            // 确保高度不超过屏幕
            const maxHeight = window.innerHeight * 0.4;
            if (canvas.height > maxHeight) {
                canvas.height = maxHeight;
                canvas.width = maxHeight * aspectRatio;
            }
            
            // 确保是 gridSize 的整数倍
            canvas.width = Math.floor(canvas.width / gridSize) * gridSize;
            canvas.height = Math.floor(canvas.height / gridSize) * gridSize;
            
            // 更新格子数
            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;
            
            // 如果游戏正在运行，重新绘制
            if (snake.length > 0) {
                // 确保蛇和食物在新画布范围内
                snake = snake.map(s => ({
                    x: Math.min(s.x, tileCountX - 1),
                    y: Math.min(s.y, tileCountY - 1)
                }));
                if (food.x >= tileCountX || food.y >= tileCountY) {
                    spawnFood();
                }
                draw();
            }
        }

        // 监听窗口大小变化
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100);
        });

        // 初始化画布大小
        resizeCanvas();

        function initGame() {
            resizeCanvas();
            const centerX = Math.floor(tileCountX / 2);
            const centerY = Math.floor(tileCountY / 2);
            
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = score;
            gameSpeed = 130; // 减慢30%
            spawnFood();
            gameOverEl.style.display = 'none';
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCountX),
                    y: Math.floor(Math.random() * tileCountY)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            for (let i = 0; i < tileCountX; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < tileCountY; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 204, 106, ${alpha})`);
                }

                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
            });

            ctx.shadowBlur = 0;

            // 绘制蛇眼睛
            const head = snake[0];
            ctx.fillStyle = '#fff';
            const eyeOffset = gridSize / 4;
            const eyeSize = 3;
            
            if (direction.x === 1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            } else if (direction.x === -1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            } else if (direction.y === -1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 检查碰撞
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                gameOver();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        function startGame() {
            if (isRunning) return;
            
            initGame();
            isRunning = true;
            isPaused = false;
            startBtn.textContent = '重新开始';
            pauseBtn.textContent = '暂停';
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function togglePause() {
            if (!isRunning) return;
            
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        function gameOver() {
            clearInterval(gameLoop);
            isRunning = false;
            
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
            
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
            startBtn.textContent = '开始游戏';
        }

        function restartGame() {
            gameOverEl.style.display = 'none';
            startGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) {
                    togglePause();
                } else {
                    startGame();
                }
                return;
            }

            if (!isRunning || isPaused) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // 🎵 丰富的背景音乐系统 (Web Audio API)
        let audioContext = null;
        let musicInterval = null;
        let masterGain = null;
        let melodyGain = null;
        let bassGain = null;
        let padGain = null;

        // 音乐结构 - 16小节循环
        const musicStructure = {
            // 和弦序列 (每小节一个和弦)
            chords: [
                { root: 262, name: 'C',  type: 'major' },
                { root: 262, name: 'C',  type: 'major' },
                { root: 294, name: 'D',  type: 'minor' },
                { root: 294, name: 'D',  type: 'minor' },
                { root: 330, name: 'E',  type: 'minor' },
                { root: 330, name: 'E',  type: 'minor' },
                { root: 349, name: 'F',  type: 'major' },
                { root: 392, name: 'G',  type: 'major' },
                { root: 262, name: 'C',  type: 'major' },
                { root: 262, name: 'C',  type: 'major' },
                { root: 294, name: 'D',  type: 'minor' },
                { root: 330, name: 'E',  type: 'minor' },
                { root: 349, name: 'F',  type: 'major' },
                { root: 392, name: 'G',  type: 'major7' },
                { root: 440, name: 'Am', type: 'minor' },
                { root: 392, name: 'G',  type: 'major' },
            ],
            // 旋律音符 (每个和弦对应的旋律)
            melodies: [
                [523, 587, 659, 523],      // C: E G A E
                [523, 494, 523, 587],      // C: E D E G
                [587, 523, 494, 440],      // Dm: G E D C
                [440, 494, 523, 587],      // Dm: C D E G
                [494, 523, 587, 659],      // Em: D E G A
                [659, 587, 523, 494],      // Em: A G E D
                [523, 587, 659, 698],      // F: E G A Bb
                [659, 698, 784, 659],      // G: A B D A
                [523, 587, 659, 784],      // C: E G A D
                [784, 659, 587, 523],      // C: D A G E
                [587, 523, 494, 440],      // Dm: G E D C
                [494, 523, 587, 659],      // Em: D E G A
                [523, 587, 659, 698],      // F: E G A Bb
                [659, 784, 880, 784],      // G7: A D E D
                [440, 523, 587, 659],      // Am: C E G A
                [659, 587, 523, 392],      // G: A G E G
            ],
            // 低音线
            bass: [
                [131, 131, 131, 131],      // C bass
                [131, 131, 147, 131],      // C with D
                [147, 147, 147, 147],      // D bass
                [147, 147, 165, 147],      // D with E
                [165, 165, 165, 165],      // E bass
                [165, 165, 175, 165],      // E with F
                [175, 175, 175, 175],      // F bass
                [196, 196, 196, 196],      // G bass
                [131, 131, 131, 131],      // C bass
                [131, 147, 165, 131],      // C walking
                [147, 147, 165, 175],      // D walking
                [165, 165, 175, 196],      // E walking
                [175, 175, 196, 175],      // F walking
                [196, 220, 196, 175],      // G7 walking
                [220, 220, 196, 175],      // Am walking
                [196, 175, 165, 131],      // G resolving
            ]
        };

        let currentBar = 0;
        let beatInBar = 0;

        // 创建柔和的钢琴音色
        function createPianoTone(freq, startTime, duration, volume = 0.08) {
            if (!audioContext) return;

            // 主音 - 正弦波
            const osc1 = audioContext.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(freq, startTime);

            // 泛音1 - 轻柔的三角波
            const osc2 = audioContext.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(freq * 2, startTime);

            // 泛音2 - 极轻的高频
            const osc3 = audioContext.createOscillator();
            osc3.type = 'sine';
            osc3.frequency.setValueAtTime(freq * 3, startTime);

            // 泛音3 - 更高的泛音
            const osc4 = audioContext.createOscillator();
            osc4.type = 'sine';
            osc4.frequency.setValueAtTime(freq * 4, startTime);

            // 包络 - 钢琴风格的快速起音，缓慢衰减
            const gain1 = audioContext.createGain();
            gain1.gain.setValueAtTime(0, startTime);
            gain1.gain.linearRampToValueAtTime(volume, startTime + 0.02);
            gain1.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            const gain2 = audioContext.createGain();
            gain2.gain.setValueAtTime(0, startTime);
            gain2.gain.linearRampToValueAtTime(volume * 0.2, startTime + 0.02);
            gain2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);

            const gain3 = audioContext.createGain();
            gain3.gain.setValueAtTime(0, startTime);
            gain3.gain.linearRampToValueAtTime(volume * 0.08, startTime + 0.02);
            gain3.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.5);

            const gain4 = audioContext.createGain();
            gain4.gain.setValueAtTime(0, startTime);
            gain4.gain.linearRampToValueAtTime(volume * 0.03, startTime + 0.02);
            gain4.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.3);

            osc1.connect(gain1);
            osc2.connect(gain2);
            osc3.connect(gain3);
            osc4.connect(gain4);
            gain1.connect(melodyGain);
            gain2.connect(melodyGain);
            gain3.connect(melodyGain);
            gain4.connect(melodyGain);

            osc1.start(startTime);
            osc2.start(startTime);
            osc3.start(startTime);
            osc4.start(startTime);
            osc1.stop(startTime + duration);
            osc2.stop(startTime + duration);
            osc3.stop(startTime + duration);
            osc4.stop(startTime + duration);
        }

        // 创建温暖的低音音色
        function createBassTone(freq, startTime, duration, volume = 0.12) {
            if (!audioContext) return;

            // 低音 - 柔和的正弦波
            const osc1 = audioContext.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(freq, startTime);

            // 低音泛音 - 轻微的三角波
            const osc2 = audioContext.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(freq * 2, startTime);

            // 包络 - 低音需要更长的衰减
            const gain1 = audioContext.createGain();
            gain1.gain.setValueAtTime(0, startTime);
            gain1.gain.linearRampToValueAtTime(volume, startTime + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            const gain2 = audioContext.createGain();
            gain2.gain.setValueAtTime(0, startTime);
            gain2.gain.linearRampToValueAtTime(volume * 0.15, startTime + 0.05);
            gain2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.8);

            osc1.connect(gain1);
            osc2.connect(gain2);
            gain1.connect(bassGain);
            gain2.connect(bassGain);

            osc1.start(startTime);
            osc2.start(startTime);
            osc1.stop(startTime + duration);
            osc2.stop(startTime + duration);
        }

        // 创建柔和的 Pad 音色 (和弦垫底)
        function createPadTone(freq, startTime, duration, volume = 0.04) {
            if (!audioContext) return;

            // Pad - 多层正弦波叠加，缓慢起音
            const osc1 = audioContext.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(freq, startTime);

            const osc2 = audioContext.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 1.002, startTime); // 轻微失谐增加厚度

            const osc3 = audioContext.createOscillator();
            osc3.type = 'triangle';
            osc3.frequency.setValueAtTime(freq * 0.5, startTime); // 低一个八度

            // 包络 - Pad 需要非常缓慢的起音和衰减
            const gain1 = audioContext.createGain();
            gain1.gain.setValueAtTime(0, startTime);
            gain1.gain.linearRampToValueAtTime(volume, startTime + 0.3);
            gain1.gain.linearRampToValueAtTime(volume * 0.8, startTime + duration - 0.3);
            gain1.gain.linearRampToValueAtTime(0, startTime + duration);

            const gain2 = audioContext.createGain();
            gain2.gain.setValueAtTime(0, startTime);
            gain2.gain.linearRampToValueAtTime(volume * 0.7, startTime + 0.3);
            gain2.gain.linearRampToValueAtTime(volume * 0.5, startTime + duration - 0.3);
            gain2.gain.linearRampToValueAtTime(0, startTime + duration);

            const gain3 = audioContext.createGain();
            gain3.gain.setValueAtTime(0, startTime);
            gain3.gain.linearRampToValueAtTime(volume * 0.4, startTime + 0.4);
            gain3.gain.linearRampToValueAtTime(volume * 0.3, startTime + duration - 0.4);
            gain3.gain.linearRampToValueAtTime(0, startTime + duration);

            osc1.connect(gain1);
            osc2.connect(gain2);
            osc3.connect(gain3);
            gain1.connect(padGain);
            gain2.connect(padGain);
            gain3.connect(padGain);

            osc1.start(startTime);
            osc2.start(startTime);
            osc3.start(startTime);
            osc1.stop(startTime + duration);
            osc2.stop(startTime + duration);
            osc3.stop(startTime + duration);
        }

        // 获取和弦音符
        function getChordNotes(root, type) {
            const ratios = {
                'major': [1, 1.25, 1.5, 1.875],
                'minor': [1, 1.2, 1.5, 1.8],
                'major7': [1, 1.25, 1.5, 1.875],
            };
            return ratios[type].map(r => root * r);
        }

        // 播放一拍的音乐
        function playBeat() {
            if (!audioContext || audioContext.state === 'closed') return;

            const now = audioContext.currentTime;
            const chord = musicStructure.chords[currentBar];
            const melodyNote = musicStructure.melodies[currentBar][beatInBar];
            const bassNote = musicStructure.bass[currentBar][beatInBar];
            const chordNotes = getChordNotes(chord.root, chord.type);

            // 旋律 - 每拍一个音符
            createPianoTone(melodyNote, now, 0.45, 0.07);

            // 低音 - 每拍一个音符
            createBassTone(bassNote, now, 0.4, 0.1);

            // Pad 和弦垫底 - 只在每小节第一拍更新
            if (beatInBar === 0) {
                chordNotes.forEach(note => {
                    createPadTone(note, now, 1.8, 0.03);
                });
            }

            // 更新节拍计数
            beatInBar++;
            if (beatInBar >= 4) {
                beatInBar = 0;
                currentBar = (currentBar + 1) % musicStructure.chords.length;
            }
        }

        // 启动背景音乐
        function startBackgroundMusic() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 主音量
                masterGain = audioContext.createGain();
                masterGain.gain.setValueAtTime(0.25, audioContext.currentTime);
                masterGain.connect(audioContext.destination);

                // 旋律音量
                melodyGain = audioContext.createGain();
                melodyGain.gain.setValueAtTime(0.8, audioContext.currentTime);
                melodyGain.connect(masterGain);

                // 低音音量
                bassGain = audioContext.createGain();
                bassGain.gain.setValueAtTime(0.6, audioContext.currentTime);
                bassGain.connect(masterGain);

                // Pad 音量
                padGain = audioContext.createGain();
                padGain.gain.setValueAtTime(0.5, audioContext.currentTime);
                padGain.connect(masterGain);
            }

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            // 每0.5秒一拍 (120 BPM)
            if (!musicInterval) {
                musicInterval = setInterval(playBeat, 500);
                playBeat();
            }
            
            musicEnabled = true;
            musicBtn.textContent = '🎵 音乐开';
            musicBtn.classList.add('active');
        }

        // 停止背景音乐
        function stopBackgroundMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
            musicEnabled = false;
            musicBtn.textContent = '🎵 音乐关';
            musicBtn.classList.remove('active');
        }

        // 切换音乐
        function toggleMusic() {
            if (musicEnabled) {
                stopBackgroundMusic();
            } else {
                startBackgroundMusic();
            }
        }

        musicBtn.addEventListener('click', toggleMusic);

        // 在用户第一次交互时启动音乐
        function initMusicOnInteraction() {
            if (musicEnabled) {
                startBackgroundMusic();
            }
            document.removeEventListener('click', initMusicOnInteraction);
            document.removeEventListener('keydown', initMusicOnInteraction);
        }

        document.addEventListener('click', initMusicOnInteraction, { once: true });
        document.addEventListener('keydown', initMusicOnInteraction, { once: true });

        // 按钮控制
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);

        // 移动端控制
        document.querySelector('.mobile-btn.up').addEventListener('click', () => {
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        });
        document.querySelector('.mobile-btn.down').addEventListener('click', () => {
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        });
        document.querySelector('.mobile-btn.left').addEventListener('click', () => {
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        });
        document.querySelector('.mobile-btn.right').addEventListener('click', () => {
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        });

        // 滑动控制（手机触摸）
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;
            handleSwipe();
            e.preventDefault();
        }, { passive: false });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minSwipeDistance = 30;

            if (Math.abs(deltaX) < minSwipeDistance && Math.abs(deltaY) < minSwipeDistance) {
                return; // 滑动距离太短，忽略
            }

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (deltaX > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 }; // 右
                } else if (deltaX < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 }; // 左
                }
            } else {
                // 垂直滑动
                if (deltaY > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 }; // 下
                } else if (deltaY < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 }; // 上
                }
            }
        }

        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
